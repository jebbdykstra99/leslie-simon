<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-label="Gold globe with sunrise arc">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="88%" r="35%">
      <stop offset="0%" stop-color="#d4a22d" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#d4a22d" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#d4a22d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0c575" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#b98a22" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e0c575" stop-opacity="0.5"/>
    </linearGradient>
    <pattern id="dotGrid" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.25" fill="#c9a24b" opacity="0.55"/>
    </pattern>
    <clipPath id="globeClip">
      <circle cx="450" cy="300" r="250"/>
    </clipPath>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="900" height="620" fill="none"/>
  <circle cx="450" cy="540" r="180" fill="url(#sunGlow)"/>

