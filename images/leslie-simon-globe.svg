      <ellipse cx="450" cy="300" rx="48" ry="250"/>
      <line x1="450" y1="50" x2="450" y2="550"/>
      <ellipse cx="450" cy="300" rx="250" ry="210"/>
      <ellipse cx="450" cy="300" rx="250" ry="155"/>
      <ellipse cx="450" cy="300" rx="250" ry="95"/>
      <ellipse cx="450" cy="300" rx="250" ry="38"/>
