<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Leslie Simon monogram">
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7c373"/><stop offset="50%" stop-color="#c79633"/><stop offset="100%" stop-color="#9a6c1f"/>
    </linearGradient>
    <clipPath id="mc"><circle cx="100" cy="100" r="84"/></clipPath>
  </defs>

  <!-- faint world map / wireframe inside the ring -->
  <g clip-path="url(#mc)">
    <g fill="none" stroke="#c79633" stroke-width="0.8" opacity="0.45">
      <ellipse cx="100" cy="100" rx="84" ry="84"/>
      <ellipse cx="100" cy="100" rx="56" ry="84"/>
      <ellipse cx="100" cy="100" rx="26" ry="84"/>
      <line x1="100" y1="16" x2="100" y2="184"/>
      <ellipse cx="100" cy="64" rx="78" ry="14"/>
      <ellipse cx="100" cy="100" rx="84" ry="16"/>
      <ellipse cx="100" cy="136" rx="78" ry="14"/>
    </g>
    <!-- faint dotted landmasses -->
    <g fill="#c79633" opacity="0.4">
      <circle cx="58" cy="70" r="1.3"/><circle cx="64" cy="66" r="1.3"/><circle cx="70" cy="70" r="1.3"/>
      <circle cx="60" cy="78" r="1.3"/><circle cx="68" cy="80" r="1.3"/><circle cx="74" cy="86" r="1.3"/>
      <circle cx="120" cy="62" r="1.3"/><circle cx="128" cy="66" r="1.3"/><circle cx="134" cy="72" r="1.3"/>
      <circle cx="124" cy="78" r="1.3"/><circle cx="132" cy="84" r="1.3"/><circle cx="138" cy="92" r="1.3"/>
      <circle cx="118" cy="110" r="1.3"/><circle cx="126" cy="116" r="1.3"/><circle cx="122" cy="126" r="1.3"/>
      <circle cx="116" cy="134" r="1.3"/><circle cx="124" cy="140" r="1.3"/>
      <circle cx="62" cy="120" r="1.3"/><circle cx="68" cy="128" r="1.3"/><circle cx="64" cy="136" r="1.3"/>
    </g>
  </g>

  <!-- thin gold ring -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="url(#mg)" stroke-width="2.4"/>
  <circle cx="100" cy="100" r="89" fill="none" stroke="url(#mg)" stroke-width="0.8" opacity="0.6"/>

  <!-- LS monogram -->
  <text x="78" y="135" font-family="Georgia, 'Times New Roman', serif" font-size="104" fill="url(#mg)" text-anchor="middle">L</text>
  <text x="120" y="138" font-family="Georgia, 'Times New Roman', serif" font-size="116" fill="url(#mg)" text-anchor="middle">S</text>
</svg>
